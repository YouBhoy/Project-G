name: spartan_g_mobile
description: SPARTAN-G Student Mental Health Monitoring Mobile Application for Android.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # HTTP Client
  dio: ^5.3.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Firebase Cloud Messaging
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0

  # Charts
  fl_chart: ^0.63.0

  # Date & Time
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^5.0.0

  # URL Launcher
  url_launcher: ^6.1.0

  # Material Design
  material_design_icons_flutter: ^7.0.0

  # Logging
  logger: ^2.0.0

  # Async
  async: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
